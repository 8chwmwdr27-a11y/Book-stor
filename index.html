<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookstore by-AD</title>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#333;}
header,footer{background:#2c3e50;color:#fff;padding:10px;text-align:center;}
main{padding:20px;}
button{cursor:pointer;transition:0.3s;animation:pop 0.5s;}
button:hover{transform:scale(1.05);}
@keyframes pop{0%{transform:scale(0.9);}100%{transform:scale(1);}}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);}
.modal-content{background:#fff;margin:10% auto;padding:20px;width:90%;max-width:500px;border-radius:8px;position:relative;}
input,textarea,select{width:100%;margin:5px 0;padding:8px;}
</style>
</head>
<body>

<header><h1>Bookstore by-AD</h1></header>

<main>
<h2>ספרים זמינים</h2>
<div id="bookList"></div>
<button onclick="openModal('modalBuy')">רכישה</button>
<button onclick="openAdmin()">Admin Dashboard</button>

<h2>ממליצים</h2>
<div id="recommendList"></div>
<button onclick="openModal('modalRecommend')">הוסף ממליץ</button>

<h2>חיפוש וסינון</h2>
<input type="text" id="searchInput" placeholder="חפש ספרים..." oninput="searchBooks()">

<h2>סטטיסטיקות</h2>
<div id="stats"></div>

<h2>עזרה - Chat AI</h2>
<button onclick="openModal('modalChat')">Chat AI</button>
<div id="chatLog" style="background:#eee;padding:10px;height:150px;overflow-y:auto;"></div>
<input type="text" id="chatInput" placeholder="שאל אותי משהו..." onkeypress="if(event.key==='Enter')sendChat()">
</main>

<footer>© 2026 Bookstore by-AD</footer>

<!-- Modals -->
<div id="modalBook" class="modal">
<div class="modal-content" id="modalBookContent"></div>
</div>

<div id="modalRecommend" class="modal">
<div class="modal-content">
<h3>הוסף ממליץ</h3>
<form id="recommendForm">
<input type="text" id="recName" placeholder="שם הממליץ" required>
<select id="recBook"></select>
<textarea id="recText" placeholder="טקסט הממליץ" required></textarea>
<input type="file" id="recImg" accept="image/*">
<button type="submit">שמור ממליץ</button>
<button type="button" onclick="closeModal('modalRecommend')">סגור</button>
</form>
</div>
</div>

<div id="modalBuy" class="modal">
<div class="modal-content">
<h3>רכישת ספר</h3>
<input type="text" id="buyName" placeholder="שם מלא" required>
<input type="email" id="buyEmail" placeholder="מייל" required>
<input type="checkbox" id="buyAgree" required> אני מסכים לתנאי שימוש
<select id="buyBookSelect"></select>
<button onclick="buyBook()">רכוש ספר</button>
<button type="button" onclick="closeModal('modalBuy')">סגור</button>
</div>
</div>

<div id="modalChat" class="modal">
<div class="modal-content">
<h3>Chat AI</h3>
<div id="chatBox"></div>
<input type="text" id="chatQuestion" placeholder="שאל שאלה..." onkeypress="if(event.key==='Enter')chatAI()">
<button type="button" onclick="closeModal('modalChat')">סגור</button>
</div>
</div>

<script>
// ====== ספרים ======
let books=JSON.parse(localStorage.getItem("books"))||[];
let recommends=JSON.parse(localStorage.getItem("recommends"))||[];
let purchases=JSON.parse(localStorage.getItem("purchases"))||[];

function displayBooks(){
    const list=document.getElementById("bookList");
    list.innerHTML="";
    books.forEach(b=>{
        list.innerHTML+=`<div><strong>${b.title}</strong> - ${b.price}₪<br>${b.desc}</div>`;
    });
    populateBuySelect();
    populateRecommendSelect();
    updateStats();
}
function populateBuySelect(){
    const sel=document.getElementById("buyBookSelect");
    sel.innerHTML="";
    books.forEach(b=>sel.innerHTML+=`<option value="${b.id}">${b.title}</option>`);
}
function openModal(id){document.getElementById(id).style.display="block";}
function closeModal(id){document.getElementById(id).style.display="none";}

// ====== רכישות ======
function buyBook(){
    const name=document.getElementById("buyName").value;
    const email=document.getElementById("buyEmail").value;
    const agree=document.getElementById("buyAgree").checked;
    const bookId=parseInt(document.getElementById("buyBookSelect").value);
    if(!name||!email||!agree||!bookId){alert("יש למלא את כל השדות"); return;}
    const book=books.find(b=>b.id===bookId);
    const purchase={id:Date.now(),name,email,book:book.title,date:new Date().toLocaleString()};
    purchases.push(purchase);
    localStorage.setItem("purchases",JSON.stringify(purchases));
    alert("הרכישה בוצעה בהצלחה!"); closeModal('modalBuy'); displayBooks();
}

// ====== ממליצים ======
function populateRecommendSelect(){
    const sel=document.getElementById("recBook");
    sel.innerHTML="";
    books.forEach(b=>sel.innerHTML+=`<option value="${b.id}">${b.title}</option>`);
    displayRecommends();
}
document.getElementById("recommendForm").addEventListener("submit",function(e){
    e.preventDefault();
    const name=document.getElementById("recName").value;
    const bookId=parseInt(document.getElementById("recBook").value);
    const text=document.getElementById("recText").value;
    const imgFile=document.getElementById("recImg").files[0];
    if(!bookId){alert("בחר ספר"); return;}
    const reader=new FileReader();
    reader.onload=function(e){
        const img=e.target.result;
        recommends.push({id:Date.now(),name,bookId,text,img});
        localStorage.setItem("recommends",JSON.stringify(recommends));
        displayRecommends();closeModal('modalRecommend');
    }
    if(imgFile){reader.readAsDataURL(imgFile);}else{recommends.push({id:Date.now(),name,bookId,text,img:""}); localStorage.setItem("recommends",JSON.stringify(recommends)); displayRecommends(); closeModal('modalRecommend');}
});
function displayRecommends(){
    const list=document.getElementById("recommendList");
    list.innerHTML="";
    recommends.forEach(r=>{
        const book=books.find(b=>b.id===r.bookId);
        if(book){list.innerHTML+=`<div>${r.name} על הספר "${book.title}": ${r.text}</div>`;}
    });
}

// ====== סטטיסטיקות ======
function updateStats(){
    const statsDiv=document.getElementById("stats");
    statsDiv.innerHTML=`<div>מספר ספרים: ${books.length}</div><div>מספר רכישות: ${purchases.length}</div>`;
}

// ====== חיפוש וסינון ======
function searchBooks(){
    const q=document.getElementById("searchInput").value.toLowerCase();
    const list=document.getElementById("bookList");
    list.innerHTML="";
    books.filter(b=>b.title.toLowerCase().includes(q)||b.desc.toLowerCase().includes(q)).forEach(b=>{
        list.innerHTML+=`<div><strong>${b.title}</strong> - ${b.price}₪<br>${b.desc}</div>`;
    });
}

// ====== Admin ======
function openAdmin(){
    const pass=prompt("הזן סיסמה ל-Admin:");
    if(pass==="ADMIN1"){alert("ברוך הבא ל-Admin Dashboard"); adminDashboard();}
    else{alert("סיסמה שגויה!");}
}
function adminDashboard(){
    let html="ADMIN DASHBOARD\n\nספרים:\n";
    books.forEach((b,i)=>html+=`${i+1}. ${b.title} - ${b.price}₪\n`);
    alert(html);
}

// ====== Chat AI דמו ======
function chatAI(){
    const q=document.getElementById("chatQuestion").value;
    const log=document.getElementById("chatBox");
    let ans="מצטער, אני לא מבין. נסה שאלה אחרת.";
    const lq=q.toLowerCase();
    if(lq.includes("ספר")) ans="תוכל לראות את רשימת הספרים בחלק העליון של הדף.";
    if(lq.includes("רכישה")) ans="כדי לקנות ספר, לחץ על כפתור 'רכישה' ומלא את הפרטים.";
    if(lq.includes("ממליץ")) ans="תוכל להוסיף ממליץ על ספר באמצעות כפתור 'הוסף ממליץ'.";
    log.innerHTML+=`<div><strong>שאלה:</strong> ${q}</div><div><strong>AI:</strong> ${ans}</div>`;
    log.scrollTop=log.scrollHeight;
    document.getElementById("chatQuestion").value="";
}

// ====== אתחול ======
displayBooks();
   // ====== Admin Dashboard משודרג ======
function adminDashboard(){
    let html = "=== ADMIN DASHBOARD ===\n\nספרים:\n";
    books.forEach((b,i)=>html+=`${i+1}. ${b.title} - ${b.price}₪\n`);
    html+="\nממליצים:\n";
    recommends.forEach((r,i)=>{
        const book=books.find(b=>b.id===r.bookId);
        html+=`${i+1}. ${r.name} על הספר "${book ? book.title : 'ללא ספר'}"\n`;
    });
    html+="\nרכישות:\n";
    purchases.forEach((p,i)=>html+=`${i+1}. ${p.name} קנה ${p.book} בתאריך ${p.date}\n`);
    alert(html);
}

// ====== עריכת ממליצים ======
function editRecommend(id){
    const r=recommends.find(r=>r.id===id);
    if(!r){alert("ממליץ לא נמצא"); return;}
    const name=prompt("שם:", r.name);
    const text=prompt("טקסט:", r.text);
    if(name) r.name=name;
    if(text) r.text=text;
    localStorage.setItem("recommends", JSON.stringify(recommends));
    displayRecommends();
}

// ====== מחיקת ממליץ ======
function deleteRecommend(id){
    if(confirm("האם למחוק את הממליץ?")){
        recommends=recommends.filter(r=>r.id!==id);
        localStorage.setItem("recommends", JSON.stringify(recommends));
        displayRecommends();
    }
}

// ====== סטטיסטיקות משודרגות ======
function updateStats(){
    const statsDiv=document.getElementById("stats");
    statsDiv.innerHTML=`<div>מספר ספרים: ${books.length}</div>
                        <div>מספר ממליצים: ${recommends.length}</div>
                        <div>מספר רכישות: ${purchases.length}</div>`;
}

// ====== חיפוש וסינון מתקדם ======
function searchBooks(){
    const q=document.getElementById("searchInput").value.toLowerCase();
    const list=document.getElementById("bookList");
    list.innerHTML="";
    books.filter(b=>b.title.toLowerCase().includes(q)||b.desc.toLowerCase().includes(q)).forEach(b=>{
        const recs=recommends.filter(r=>r.bookId===b.id);
        let recText = recs.map(r=>`<br>ממליץ: ${r.name} - "${r.text}"`).join("");
        list.innerHTML+=`<div><strong>${b.title}</strong> - ${b.price}₪<br>${b.desc}${recText}</div>`;
    });
}

// ====== עדכון סלקטורים של ממליצים ברשימה ======
function populateRecommendSelect(){
    const sel=document.getElementById("recBook");
    sel.innerHTML="";
    books.forEach(b=>sel.innerHTML+=`<option value="${b.id}">${b.title}</option>`);
    displayRecommends();
}

// ====== הצגת ממליצים בצד משתמש ======
function displayRecommends(){
    const list=document.getElementById("recommendList");
    list.innerHTML="";
    recommends.forEach(r=>{
        const book=books.find(b=>b.id===r.bookId);
        if(book){
            list.innerHTML+=`<div>
                <strong>${r.name}</strong> על הספר "${book.title}": ${r.text}
                ${r.img?`<br><img src="${r.img}" width="80" style="border-radius:5px;">`:''}
                <br><button onclick="editRecommend(${r.id})">ערוך</button>
                <button onclick="deleteRecommend(${r.id})">מחק</button>
            </div><hr>`;
        }
    });
}

// ====== אתחול מחדש לאחר טעינת הדף ======
displayBooks();
populateRecommendSelect();
updateStats(); 
</script>

</body>
</html>
