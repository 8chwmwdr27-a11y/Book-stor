<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חנות ספרים דיגיטלית HFL</title>
<style>
body {margin:0;font-family:'Segoe UI',sans-serif;background:#f4f4f9;color:#333;}
header, footer {background:#222;color:#fff;text-align:center;padding:10px;}
.container {max-width:1200px;margin:auto;padding:20px;}
h1,h2,h3 {margin:0 0 10px 0;}
button {padding:8px 16px;margin:5px;border:none;border-radius:5px;cursor:pointer;}
button.primary{background:#4caf50;color:#fff;}
button.danger{background:#f44336;color:#fff;}
button.info{background:#2196f3;color:#fff;}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.2);}
.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;overflow:auto;background:rgba(0,0,0,0.5);}
.modal-content{background:#fff;margin:50px auto;padding:20px;border-radius:10px;width:90%;max-width:500px;position:relative;}
.close{position:absolute;top:10px;right:15px;font-size:20px;cursor:pointer;}
input, textarea, select {width:100%;padding:8px;margin:5px 0 15px 0;border-radius:5px;border:1px solid #ccc;}
.star-rating {display:flex;flex-direction:row-reverse;font-size:1.2em;justify-content:flex-start;}
.star-rating input{display:none;}
.star-rating label{color:#ccc;cursor:pointer;}
.star-rating input:checked ~ label, .star-rating label:hover, .star-rating label:hover ~ label{color:gold;}
.round-img{width:60px;height:60px;border-radius:50%;object-fit:cover;}
.books-list, .reviews-list{display:flex;flex-wrap:wrap;gap:15px;}
.books-list .card, .reviews-list .card{flex:1 1 250px;}
.checkbox-legal{margin-bottom:15px;}
.success-message{background:#d4edda;color:#155724;padding:10px;border-radius:5px;margin-bottom:10px;}
</style>
</head>
<body>

<header>
<h1>חנות ספרים דיגיטלית HFL</h1>
</header>

<div class="container">

<!-- ========================== צד מנהל ========================== -->
<section id="admin-panel">
<h2>לוח ניהול</h2>
<button class="primary" onclick="openModal('addBookModal')">יצירת ספר חדש</button>
<button class="primary" onclick="openModal('addReviewerModal')">הוספת ממליץ</button>
<button class="info" onclick="openModal('managePurchasesModal')">ניהול רכישות</button>

<h3>ספרים קיימים</h3>
<div class="books-list" id="adminBooksList"></div>

<h3>ממליצים קיימים</h3>
<div class="reviews-list" id="adminReviewersList"></div>
</section>

<!-- ========================== צד משתמש ========================== -->
<section id="user-panel">
<h2>ספרים לרכישה</h2>
<div class="books-list" id="userBooksList"></div>
<div id="userMessage"></div>
</section>

</div>

<!-- ========================== מודלים ========================== -->
<!-- מודל יצירת ספר -->
<div id="addBookModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('addBookModal')">&times;</span>
<h3>יצירת ספר חדש</h3>
<input type="text" id="bookName" placeholder="שם הספר">
<input type="number" id="bookPrice" placeholder="מחיר">
<textarea id="bookDescription" placeholder="תיאור הספר"></textarea>
<input type="file" id="bookImage" accept="image/*">
<input type="file" id="bookPDF" accept="application/pdf">
<button class="primary" onclick="addBook()">פרסם ספר</button>
</div>
</div>

<!-- מודל הוספת ממליץ -->
<div id="addReviewerModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('addReviewerModal')">&times;</span>
<h3>הוספת ממליץ</h3>
<input type="text" id="reviewerName" placeholder="שם הממליץ">
<textarea id="reviewerText" placeholder="תיאור המלצה על הספר"></textarea>
<select id="reviewerBookSelect"></select>
<input type="file" id="reviewerImage" accept="image/*">
<div class="star-rating">
<input type="radio" id="star5" name="rating" value="5"><label for="star5">&#9733;</label>
<input type="radio" id="star4" name="rating" value="4"><label for="star4">&#9733;</label>
<input type="radio" id="star3" name="rating" value="3"><label for="star3">&#9733;</label>
<input type="radio" id="star2" name="rating" value="2"><label for="star2">&#9733;</label>
<input type="radio" id="star1" name="rating" value="1"><label for="star1">&#9733;</label>
</div>
<button class="primary" onclick="addReviewer()">פרסם ממליץ</button>
</div>
</div>

<!-- מודל ניהול רכישות -->
<div id="managePurchasesModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('managePurchasesModal')">&times;</span>
<h3>ניהול רכישות</h3>
<div id="purchasesList"></div>
</div>
</div>

<!-- מודל רכישה בצד משתמש -->
<div id="purchaseModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('purchaseModal')">&times;</span>
<h3>רכישת ספר</h3>
<input type="text" id="buyerName" placeholder="שם מלא">
<input type="email" id="buyerEmail" placeholder="מייל">
<div class="checkbox-legal">
<label><input type="checkbox" id="legalCheckbox"> אני מאשר/ת את תנאי הפרטיות</label>
</div>
<button class="primary" onclick="confirmPurchase()">אישור רכישה</button>
<div id="purchaseMessage"></div>
</div>
</div>

<script>
/* ===================== משתנים ===================== */
let books = JSON.parse(localStorage.getItem('books')||'[]');
let reviewers = JSON.parse(localStorage.getItem('reviewers')||'[]');
let purchases = JSON.parse(localStorage.getItem('purchases')||'[]');
let currentPurchaseBookId = null;

/* ===================== פונקציות מודלים ===================== */
function openModal(id){ document.getElementById(id).style.display='block'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }

/* ===================== פונקציות ספרים ===================== */
function addBook() {
const name = document.getElementById('bookName').value;
const price = document.getElementById('bookPrice').value;
const desc = document.getElementById('bookDescription').value;
const img = document.getElementById('bookImage').files[0];
const pdf = document.getElementById('bookPDF').files[0];
if(!name||!price||!desc||!img||!pdf){ alert('נא למלא את כל השדות'); return; }
const reader = new FileReader();
reader.onload=function(e){
    const imgData=e.target.result;
    const book={id:Date.now(), name, price, desc, img:imgData, pdfName:pdf.name};
    books.push(book);
    localStorage.setItem('books', JSON.stringify(books));
    updateBooksUI();
    closeModal('addBookModal');
};
reader.readAsDataURL(img);
}

/* ===================== עדכון ספרים ===================== */
function updateBooksUI(){
const adminList=document.getElementById('adminBooksList');
const userList=document.getElementById('userBooksList');
const select=document.getElementById('reviewerBookSelect');
adminList.innerHTML=''; userList.innerHTML=''; select.innerHTML='';
books.forEach(book=>{
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<img src="${book.img}" style="width:100%;height:150px;object-fit:cover;border-radius:10px;">
    <h4>${book.name}</h4><p>${book.desc}</p><p>₪${book.price}</p>
    <button class="danger" onclick="deleteBook(${book.id})">מחק</button>`;
    adminList.appendChild(card);

    const userCard=document.createElement('div'); userCard.className='card';
    userCard.innerHTML=`<img src="${book.img}" style="width:100%;height:150px;object-fit:cover;border-radius:10px;">
    <h4>${book.name}</h4><p>${book.desc}</p><p>₪${book.price}</p>
    <button class="primary" onclick="startPurchase(${book.id})">רכישה</button>`;
    userList.appendChild(userCard);

    const opt=document.createElement('option'); opt.value=book.id; opt.text=book.name;
    select.appendChild(opt);
});
}

/* ===================== מחיקת ספר ===================== */
function deleteBook(id){
books=books.filter(b=>b.id!==id);
localStorage.setItem('books', JSON.stringify(books));
updateBooksUI();
}

/* ===================== פונקציות ממליצים ===================== */
function addReviewer() {
const name=document.getElementById('reviewerName').value;
const text=document.getElementById('reviewerText').value;
const bookId=document.getElementById('reviewerBookSelect').value;
const imgFile=document.getElementById('reviewerImage').files[0];
const rating=document.querySelector('input[name="rating"]:checked')?.value;
if(!name||!text||!bookId||!imgFile||!rating){ alert('נא למלא את כל השדות'); return; }
const reader=new FileReader();
reader.onload=function(e){
    const imgData=e.target.result;
    reviewers.push({id:Date.now(), name, text, bookId, img:imgData, rating});
    localStorage.setItem('reviewers', JSON.stringify(reviewers));
    updateReviewersUI();
    closeModal('addReviewerModal');
};
reader.readAsDataURL(imgFile);
}

function updateReviewersUI(){
const list=document.getElementById('adminReviewersList');
list.innerHTML='';
reviewers.forEach(r=>{
    const book=books.find(b=>b.id==r.bookId);
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`
    <img src="${r.img}" class="round-img">
    <h4>${r.name}</h4>
    <p>${r.text}</p>
    <p>על ספר: ${book?.name}</p>
    <p>דירוג: ${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</p>
    <button class="danger" onclick="deleteReviewer(${r.id})">מחק ממליץ</button>`;
    list.appendChild(card);
});
}

function deleteReviewer(id){
reviewers=reviewers.filter(r=>r.id!==id);
localStorage.setItem('reviewers', JSON.stringify(reviewers));
updateReviewersUI();
}

/* ===================== פונקציות רכישה ===================== */
function startPurchase(bookId){
currentPurchaseBookId=bookId;
document.getElementById('buyerName').value='';
document.getElementById('buyerEmail').value='';
document.getElementById('legalCheckbox').checked=false;
document.getElementById('purchaseMessage').innerHTML='';
openModal('purchaseModal');
}

function confirmPurchase(){
const name=document.getElementById('buyerName').value;
const email=document.getElementById('buyerEmail').value;
const legal=document.getElementById('legalCheckbox').checked;
if(!name||!email){ alert('נא למלא את כל השדות'); return;}
if(!legal){ alert('יש לאשר תנאי פרטיות'); return;}
purchases.push({id:Date.now(), bookId:currentPurchaseBookId, buyerName:name, buyerEmail:email, status:'pending'});
localStorage.setItem('purchases', JSON.stringify(purchases));
document.getElementById('purchaseMessage').innerHTML='<div class="success-message">הרכישה נשלחה למנהל לאישור</div>';
updatePurchasesUI();
setTimeout(()=>closeModal('purchaseModal'),1500);
}

/* ===================== ניהול רכישות ===================== */
function updatePurchasesUI(){
const list=document.getElementById('purchasesList');
list.innerHTML='';
purchases.forEach(p=>{
    const book=books.find(b=>b.id==p.bookId);
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`
    <p>רכישת ספר: ${book?.name}</p>
    <p>רוכש: ${p.buyerName} | ${p.buyerEmail}</p>
    <p>סטטוס: ${p.status}</p>
    ${p.status==='pending'?`
    <button class="primary" onclick="approvePurchase(${p.id})">אישור</button>
    <button class="danger" onclick="rejectPurchase(${p.id})">סירוב</button>`:''}`;
    list.appendChild(card);
});
}

function approvePurchase(id){
const purchase=purchases.find(p=>p.id===id);
if(purchase){ 
    purchase.status='approved';
    localStorage.setItem('purchases', JSON.stringify(purchases));
    alert(`הרכישה אושרה. לשלוח PDF לרוכש: ${purchase.buyerEmail}`);
    updatePurchasesUI();
}
}

function rejectPurchase(id){
const purchase=purchases.find(p=>p.id===id);
if(purchase){ 
    purchase.status='rejected';
    localStorage.setItem('purchases', JSON.stringify(purchases));
    alert(`הרכישה נדחתה. שליחת מייל לרוכש: ${purchase.buyerEmail}`);
    updatePurchasesUI();
}
}

/* ===================== אתחול ===================== */
updateBooksUI();
updateReviewersUI();
updatePurchasesUI();

  authDomain: "hflsystem.firebaseapp.com",
  databaseURL: "https://hflsystem-default-rtdb.firebaseio.com",
  projectId: "hflsystem",

  messagingSenderId: "469775027908",

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
</script>

<footer>
<p>© 2026 HFL Digital Store</p>
</footer>
</body>
</html>
