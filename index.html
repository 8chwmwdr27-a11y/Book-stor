<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HFL Digital Bookstore</title>
<style>
/* ======== עיצוב בסיסי SUS + צבעי מותג ======== */
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#f5f5f7;
    color:#333;
}
header {
    background:#4a90e2;
    color:#fff;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
header h1 {
    margin:0;
}
.container {
    padding:20px;
    max-width:1200px;
    margin:auto;
}
.book-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
}
.book-card {
    background:#fff;
    padding:15px;
    border-radius:8px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
}
.book-card:hover {
    transform: translateY(-5px);
    box-shadow:0 8px 16px rgba(0,0,0,0.2);
}
.book-card img {
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:5px;
}
button {
    padding:10px 15px;
    margin-top:10px;
    background:#4a90e2;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
    transition: background 0.3s;
}
button:hover { background:#357ABD; }
#chatButton {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#ff5a5f;
    border-radius:50%;
    width:60px;
    height:60px;
    font-size:24px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}
#chatBox {
    position:fixed;
    bottom:90px;
    right:20px;
    width:300px;
    max-height:400px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 8px 16px rgba(0,0,0,0.3);
    display:none;
    flex-direction:column;
    overflow:hidden;
}
#chatHeader {
    background:#ff5a5f;
    color:#fff;
    padding:10px;
    text-align:center;
}
#chatMessages {
    flex:1;
    padding:10px;
    overflow-y:auto;
}
.chat-message {
    margin:5px 0;
    padding:8px 12px;
    border-radius:15px;
    max-width:80%;
    animation:fadeIn 0.5s;
}
.user-message { background:#e0e0e0; align-self:flex-end; }
.ai-message { background:#4a90e2; color:#fff; align-self:flex-start; }
#chatInput {
    display:flex;
    border-top:1px solid #ccc;
}
#chatInput input {
    flex:1;
    padding:10px;
    border:none;
    outline:none;
}
#chatInput button {
    border-radius:0;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
/* Responsive */
@media(max-width:768px){
    .book-grid { grid-template-columns: repeat(auto-fill,minmax(150px,1fr)); }
}
</style>
</head>
<body>

<header>
    <h1>HFL Digital Bookstore</h1>
    <button onclick="openAdmin()">Admin Dashboard</button>
</header>

<div class="container">
    <input type="text" id="searchInput" placeholder="חיפוש ספרים..." onkeyup="filterBooks()">
    <div class="book-grid" id="bookGrid"></div>
</div>

<!-- Chat AI Button -->
<div id="chatButton" onclick="toggleChat()">💬</div>
<div id="chatBox">
    <div id="chatHeader">HFL AI Assistant</div>
    <div id="chatMessages"></div>
    <div id="chatInput">
        <input type="text" id="userChat" placeholder="כתוב כאן..." onkeypress="checkEnter(event)">
        <button onclick="sendChat()">Send</button>
    </div>
</div>

<script>
// ====== נתוני ספרים ראשוניים ======
let books = [
    {id:1, title:"ספר דיגיטלי ראשון", price:"49₪", desc:"תיאור קצר", img:"https://via.placeholder.com/200x250?text=Book1"},
    {id:2, title:"ספר דיגיטלי שני", price:"59₪", desc:"תיאור קצר", img:"https://via.placeholder.com/200x250?text=Book2"},
    {id:3, title:"ספר דיגיטלי שלישי", price:"39₪", desc:"תיאור קצר", img:"https://via.placeholder.com/200x250?text=Book3"}
];
localStorage.setItem("books",JSON.stringify(books));

function displayBooks() {
    const grid = document.getElementById("bookGrid");
    grid.innerHTML = "";
    let savedBooks = JSON.parse(localStorage.getItem("books")) || [];
    savedBooks.forEach(book=>{
        const card = document.createElement("div");
        card.className="book-card";
        card.innerHTML=`<img src="${book.img}"><h3>${book.title}</h3><p>${book.desc}</p><strong>${book.price}</strong><br><button onclick="buyBook(${book.id})">קנה עכשיו</button>`;
        grid.appendChild(card);
    });
}
displayBooks();

function filterBooks() {
    const query = document.getElementById("searchInput").value.toLowerCase();
    let savedBooks = JSON.parse(localStorage.getItem("books")) || [];
    const filtered = savedBooks.filter(b=>b.title.toLowerCase().includes(query));
    const grid = document.getElementById("bookGrid");
    grid.innerHTML = "";
    filtered.forEach(book=>{
        const card = document.createElement("div");
        card.className="book-card";
        card.innerHTML=`<img src="${book.img}"><h3>${book.title}</h3><p>${book.desc}</p><strong>${book.price}</strong><br><button onclick="buyBook(${book.id})">קנה עכשיו</button>`;
        grid.appendChild(card);
    });
}

function buyBook(id) {
    alert("בקשת רכישה נשלחה למנהל. לאחר אישור תקבל מייל עם הספר וקבלה.");
}

// ====== Chat AI דמו ======
const chatMessages = document.getElementById("chatMessages");
function toggleChat(){
    const box=document.getElementById("chatBox");
    box.style.display = box.style.display==="flex"?"none":"flex";
}
function checkEnter(e){if(e.key==="Enter") sendChat();}
function sendChat(){
    const input=document.getElementById("userChat");
    const text=input.value.trim();
    if(!text) return;
    appendMessage(text,"user");
    input.value="";
    setTimeout(()=>{generateAIResponse(text)},500);
}
function appendMessage(msg,type){
    const div=document.createElement("div");
    div.className=type==="user"?"chat-message user-message":"chat-message ai-message";
    div.innerText=msg;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}
function generateAIResponse(userText){
    let response = "סליחה, אני לא מבין. נסה לשאול על רכישות, הורדות או ספרים.";
    userText = userText.toLowerCase();
    if(userText.includes("קנה") || userText.includes("רכישה")) response="כדי לקנות ספר, לחץ על הספר בדף הבית ואז לחץ 'קנה עכשיו'.";
    else if(userText.includes("הורד") || userText.includes("download")) response="אתה יכול להוריד ספרים שרכשת באזור האישי שלך.";
    else if(userText.includes("אזור אישי") || userText.includes("my books")) response="ב'אזור אישי' תמצא את כל הספרים שרכשת ואת סטטוס הרכישות שלך.";
    else if(userText.includes("חיפוש") || userText.includes("search")) response="תוכל לחפש ספרים בעזרת סרגל החיפוש שמעל רשימת הספרים בדף הבית.";
    else if(userText.includes("ממליצים") || userText.includes("recommend")) response="בכל ספר תוכל לראות ממליצים עם תמונה ושם, ולחיצה עליהם תוביל לספר המומלץ.";
    appendMessage(response,"ai");
}

// ====== Dashboard Admin (דמו פשוט) ======
function openAdmin(){
    alert("דמו צד מנהל נפתח כאן (יצירה, עריכה, מחיקה, מכירות, ממליצים)");
}
</script>

</body>
</html>
